{% extends "base.html" %}
{% block title %}رویدادهای علمی{% endblock %}
{% block content %}
<h1 class="mb-4">رویدادهای علمی</h1>
<div class="list-group">
    {% for event in events_list %}
    <a href="/events/{{ event.id }}" class="list-group-item list-group-item-action">
        <div class="d-flex w-100 justify-content-between">
            <h5 class="mb-1">{{ event.title }}</h5>
            <small>{{ event.date.strftime('%Y-%m-%d') }}</small>
        </div>
        <p class="mb-1">{{ event.location }}</p>
    </a>
    {% else %}
    <p>در حال حاضر هیچ رویدادی ثبت نشده است.</p>
    {% endfor %}
</div>
{% endblock %}
