{% extends "base.html" %}
{% block title %}صفحه اصلی{% endblock %}
{% block content %}
<div class="p-5 mb-4 bg-light rounded-3 text-center">
    <h1 class="display-5 fw-bold">به سامانه مدیریت علمی خوش آمدید</h1>
</div>
<h2 class="text-center mb-4">آخرین اخبار</h2>
<div class="row">
    {% for news in news_list %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">{{ news.title }}</h5>
                <p class="card-text">{{ news.summary }}</p>
                <a href="/news/{{ news.id }}" class="btn btn-primary">ادامه مطلب</a>
            </div>
        </div>
    </div>
    {% else %}
    <p>خبری برای نمایش وجود ندارد.</p>
    {% endfor %}
</div>
{% endblock %}
