{% extends "base.html" %}

{% block title %}Create New Event{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Create a New Event</h2>
    <hr>
    <form action="/api/v1/events" method="post" class="mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="form-group mb-3">
                    <label for="title" class="form-label">Event Title</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="form-group mb-3">
                    <label for="summary" class="form-label">Summary</label>
                    <textarea class="form-control" id="summary" name="summary" rows="2" required></textarea>
                </div>
                <div class="form-group mb-3">
                    <label for="description" class="form-label">Full Description</label>
                    <textarea class="form-control" id="description" name="description" rows="5" required></textarea>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group mb-3">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="Internal Meeting">Internal Meeting</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Competition">Competition/Hackathon</option>
                        <option value="Seminar">Lecture/Seminar</option>
                        <option value="Site Visit">Site Visit</option>
                    </select>
                </div>
                <div class="form-group mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Online, Main Hall" required>
                </div>
                <div class="form-group mb-3">
                    <label for="image_url" class="form-label">Image URL</label>
                    <input type="url" class="form-control" id="image_url" name="image_url" placeholder="https://example.com/poster.jpg">
                </div>
                <div class="form-group mb-3">
                    <label for="capacity" class="form-label">Capacity</label>
                    <input type="number" class="form-control" id="capacity" name="capacity" min="0">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group mb-3">
                    <label for="start_time" class="form-label">Start Time</label>
                    <input type="datetime-local" class="form-control" id="start_time" name="start_time" required>
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group mb-3">
                    <label for="end_time" class="form-label">End Time</label>
                    <input type="datetime-local" class="form-control" id="end_time" name="end_time">
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group mb-3">
                    <label for="registration_deadline" class="form-label">Registration Deadline</label>
                    <input type="datetime-local" class="form-control" id="registration_deadline" name="registration_deadline">
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary mt-3">Create Event</button>
    </form>
</div>
{% endblock %}
