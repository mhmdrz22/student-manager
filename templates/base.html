<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}سامانه علمی{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="/">سامانه علمی</a>
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="/">خانه</a></li>
                        <li class="nav-item"><a class="nav-link" href="/news">اخبار</a></li>
                        <li class="nav-item"><a class="nav-link" href="/articles">مقالات</a></li>
                    </ul>
                    <ul class="navbar-nav">
                        {% if user %}
                            <li class="nav-item"><a class="nav-link" href="/dashboard">داشبورد ({{ user.username }})</a></li>
                            <li class="nav-item"><a class="btn btn-danger" href="/logout">خروج</a></li>
                        {% else %}
                            <li class="nav-item"><a class="btn btn-secondary" href="/login">ورود</a></li>
                            <li class="nav-item ms-2"><a class="btn btn-primary" href="/register">ثبت نام</a></li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer mt-auto py-3 bg-dark text-light text-center">
        <p>تمامی حقوق محفوظ است &copy; 2024</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
