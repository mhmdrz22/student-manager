{% extends "base.html" %}

{% block title %}ثبت نام - سامانه علمی{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">ثبت نام عضو جدید</h2>
                <form action="/api/v1/register" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">نام کاربری:</label>
                        <input type="text" id="username" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">ایمیل:</label>
                        <input type="email" id="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">رمز عبور:</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">ثبت نام</button>
                    </div>
                </form>
                <p class="mt-3 text-center">حساب کاربری دارید؟ <a href="/login">وارد شوید</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block head %}
<style>
    body {
        background-color: #e9ecef;
        display: flex;
        align-items: center;
        min-height: 100vh;
    }
    main {
        width: 100%;
    }
</style>
{% endblock %}
