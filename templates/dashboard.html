<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبرد - سامانه علمی</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; margin: 20px; }
        h1, h2 { color: #333; }
        a { text-decoration: none; color: #007bff; }
        nav a { margin-left: 15px; }
        .content-section { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <h1>داشبرد کاربری</h1>
        <nav>
            <a href="/">خانه</a>
            <a href="/news">اخبار</a>
            <a href="/articles">مقالات</a>
            <a href="#">خروج</a>
        </nav>
    </header>
    <main>
        <h2>ارسال محتوای جدید</h2>
        <div class="content-section">
            <h3>ارسال مقاله</h3>
            <form action="/api/v1/articles" method="post">
                <label for="article_title">عنوان مقاله:</label><br>
                <input type="text" id="article_title" name="title" style="width: 80%;"><br><br>
                <label for="article_content">محتوای مقاله:</label><br>
                <textarea id="article_content" name="content" rows="8" style="width: 80%;"></textarea><br><br>
                <button type="submit">ارسال مقاله</button>
            </form>
        </div>

        <div class="content-section">
            <h3>ارسال خبر</h3>
            <form action="/api/v1/news" method="post">
                <label for="news_title">عنوان خبر:</label><br>
                <input type="text" id="news_title" name="title" style="width: 80%;"><br><br>
                <label for="news_content">محتوای خبر:</label><br>
                <textarea id="news_content" name="content" rows="5" style="width: 80%;"></textarea><br><br>
                <button type="submit">ارسال خبر</button>
            </form>
        </div>

        <div class="content-section">
            <h2>محتواهای ارسال شده شما</h2>
            <p>در حال حاضر محتوایی ارسال نکرده‌اید.</p>
        </div>
    </main>
</body>
</html>
