{% extends "base.html" %}
{% block title %}داشبورد{% endblock %}
{% block content %}
<h1 class="mb-4">داشبورد</h1>
<div class="card">
    <div class="card-header">
        ارسال محتوای جدید
    </div>
    <div class="card-body">
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="article-tab" data-bs-toggle="tab" data-bs-target="#article" type="button" role="tab">ارسال مقاله</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="news-tab" data-bs-toggle="tab" data-bs-target="#news" type="button" role="tab">ارسال خبر</button>
            </li>
        </ul>
        <div class="tab-content pt-3">
            <div class="tab-pane active" id="article" role="tabpanel">
                <form action="/api/v1/articles" method="post">
                    <div class="mb-3"><label class="form-label">عنوان مقاله:</label><input type="text" name="title" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">خلاصه مقاله:</label><textarea name="summary" rows="3" class="form-control"></textarea></div>
                    <div class="mb-3"><label class="form-label">محتوای مقاله:</label><textarea name="content" rows="8" class="form-control"></textarea></div>
                    <div class="mb-3"><label class="form-label">آدرس تصویر:</label><input type="text" name="image_url" class="form-control"></div>
                    <button type="submit" class="btn btn-primary">ارسال مقاله</button>
                </form>
            </div>
            <div class="tab-pane" id="news" role="tabpanel">
                <form action="/api/v1/news" method="post">
                    <div class="mb-3"><label class="form-label">عنوان خبر:</label><input type="text" name="title" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">خلاصه خبر:</label><textarea name="summary" rows="3" class="form-control"></textarea></div>
                    <div class="mb-3"><label class="form-label">دسته بندی:</label><input type="text" name="category" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">محتوای خبر:</label><textarea name="content" rows="5" class="form-control"></textarea></div>
                    <div class="mb-3"><label class="form-label">آدرس تصویر:</label><input type="text" name="image_url" class="form-control"></div>
                    <button type="submit" class="btn btn-primary">ارسال خبر</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
