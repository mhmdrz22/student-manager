{% extends "base.html" %}

{% block title %}داشبورد کاربری - سامانه علمی{% endblock %}

{% block content %}
<h1 class="mb-4">داشبورد کاربری</h1>

<div class="row">
    <div class="col-md-8">
        <!-- New Content Submission -->
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="h5 mb-0">ارسال محتوای جدید</h2>
            </div>
            <div class="card-body">
                <!-- Nav tabs -->
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="article-tab" data-bs-toggle="tab" data-bs-target="#article" type="button" role="tab" aria-controls="article" aria-selected="true">ارسال مقاله</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="news-tab" data-bs-toggle="tab" data-bs-target="#news" type="button" role="tab" aria-controls="news" aria-selected="false">ارسال خبر</button>
                    </li>
                </ul>

                <!-- Tab panes -->
                <div class="tab-content pt-3">
                    <div class="tab-pane active" id="article" role="tabpanel" aria-labelledby="article-tab">
                        <form action="/api/v1/articles" method="post">
                            <div class="mb-3">
                                <label for="article_title" class="form-label">عنوان مقاله:</label>
                                <input type="text" id="article_title" name="title" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="article_content" class="form-label">محتوای مقاله:</label>
                                <textarea id="article_content" name="content" rows="8" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">ارسال مقاله</button>
                        </form>
                    </div>
                    <div class="tab-pane" id="news" role="tabpanel" aria-labelledby="news-tab">
                        <form action="/api/v1/news" method="post">
                             <div class="mb-3">
                                <label for="news_title" class="form-label">عنوان خبر:</label>
                                <input type="text" id="news_title" name="title" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label for="news_content" class="form-label">محتوای خبر:</label>
                                <textarea id="news_content" name="content" rows="5" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">ارسال خبر</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">محتواهای شما</h2>
            </div>
            <div class="card-body">
                <p>در حال حاضر محتوایی ارسال نکرده‌اید.</p>
                <!-- Later, this can list user's articles and news -->
            </div>
        </div>
    </div>
</div>
{% endblock %}
