<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محیط توسعه وب</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Monaco Editor Loader -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.33.0/min/vs/loader.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-1/3 bg-white p-6 overflow-y-auto">
            <h2 class="text-2xl font-bold mb-4">داشبورد</h2>

            <!-- Search Box -->
            <div class="mb-6">
                <input type="text" id="search-box" placeholder="جستجو در محتوا..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Cards -->
            <div id="card-container" class="space-y-4">
                <div class="card bg-gray-50 p-6 rounded-xl shadow-md hover:shadow-xl hover:scale-102 transition-transform">
                    <h3 class="text-xl font-semibold text-blue-600 flex items-center">
                        <i class="fas fa-tasks ml-2"></i>
                        دستور کار
                    </h3>
                    <p class="mt-2 text-gray-600">وظایف و مراحل لازم برای تکمیل پروژه را در اینجا مشاهده کنید.</p>
                    <button class="mt-4 bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">شروع کار</button>
                </div>
                <div class="card bg-gray-50 p-6 rounded-xl shadow-md hover:shadow-xl hover:scale-102 transition-transform">
                    <h3 class="text-xl font-semibold text-green-600 flex items-center">
                        <i class="fas fa-book-open ml-2"></i>
                        راهنمای اولیه
                    </h3>
                    <p class="mt-2 text-gray-600">راهنمای سریع برای شروع کار با ابزارها و فریمورک‌ها.</p>
                    <button class="mt-4 bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">مشاهده جزئیات</button>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="w-2/3 flex flex-col">
            <!-- Code Editor -->
            <div id="editor-container" class="flex-grow"></div>
            <!-- Terminal -->
            <div id="terminal" class="h-1/4 bg-gray-900 text-white p-4 font-mono">
                <p>&gt; ترمینال آماده است...</p>
                <div class="flex">
                    <span class="text-green-400 mr-2">&gt;</span>
                    <input type="text" class="bg-transparent border-none text-white w-full focus:outline-none">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
